name: Daily RAG Data Pipeline

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  data-pipeline:
    runs-on: ubuntu-latest
    environment: Prod  # Uses Prod environment secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ========================================
      # Run Complete Pipeline (Fetch + Insert + Embed)
      # ========================================
      - name: Run RAG data pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Running complete RAG data pipeline..."
          python src/data_collection/pipeline.py

      # ========================================
      # Summary
      # ========================================
      - name: Pipeline Summary
        if: always()
        run: |
          echo "=================================="
          echo "✅ RAG Data Pipeline Complete"
          echo "=================================="
          echo "✓ Fetched & inserted RAG models/repos"
          echo "✓ Created deduplicated vector embeddings"
          echo "✓ Ready for semantic search!"
          echo "=================================="
